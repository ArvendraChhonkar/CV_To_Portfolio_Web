<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>{{ user.NAME }} | Portfolio</title>
</head>
<body class="bg-gray-50">
    <div class="max-w-4xl mx-auto p-10 bg-white shadow-lg mt-10 rounded-lg">
        <h1 class="text-4xl font-bold text-gray-800">{{ user.NAME }}</h1>
        <p class="text-blue-600">{{ user.EMAIL }} | {{ user.PHONE }}</p>
        
        <h2 class="text-2xl font-semibold mt-8 border-b-2 border-blue-500">Skills</h2>
        <div class="flex flex-wrap gap-2 mt-4">
            {% for skill in user.SKILLS %}
                <span class="bg-gray-200 px-3 py-1 rounded text-sm">{{ skill }}</span>
            {% endfor %}
        </div>

        <h2 class="text-2xl font-semibold mt-8 border-b-2 border-blue-500">Projects</h2>
        <p class="mt-4 whitespace-pre-line text-gray-700">{{ user.PROJECTS }}</p>
    </div>
</body>
</html>
